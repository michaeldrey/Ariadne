<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ariadne</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Ariadne</h1>
      </div>
      <ul class="nav-links">
        <li><a href="#/" class="nav-link active" data-view="dashboard">
          <span class="nav-icon">&#9632;</span> Dashboard
        </a></li>
        <li><a href="#/roles" class="nav-link" data-view="roles">
          <span class="nav-icon">&#9654;</span> Roles
        </a></li>
        <li><a href="#/tasks" class="nav-link" data-view="tasks">
          <span class="nav-icon">&#10003;</span> Tasks
        </a></li>
        <li><a href="#/contacts" class="nav-link" data-view="contacts">
          <span class="nav-icon">&#9734;</span> Contacts
        </a></li>
        <li><a href="#/search" class="nav-link" data-view="search">
          <span class="nav-icon">&#8981;</span> Job Search
        </a></li>
      </ul>
      <div class="sidebar-footer">
        <a href="#/settings" class="nav-link" data-view="settings">
          <span class="nav-icon">&#9881;</span> Settings
        </a>
      </div>
    </nav>

    <!-- Main content -->
    <main id="content">
      <div id="nav-bar">
        <button id="nav-back" class="nav-btn" title="Back (Cmd-[)">←</button>
        <button id="nav-forward" class="nav-btn" title="Forward (Cmd-])">→</button>
      </div>
      <div id="view-container"></div>
    </main>

    <!-- Chat drawer (role-scoped; hidden outside of role detail) -->
    <aside id="chat-drawer" class="chat-closed"></aside>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <!-- Modal container -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-content"></div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
