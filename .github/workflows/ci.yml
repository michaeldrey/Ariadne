name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (macOS)
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "15.0"
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: fmt
        run: cargo fmt --check
        working-directory: src-tauri

      - name: clippy
        run: cargo clippy --no-deps --all-targets -- -D warnings
        working-directory: src-tauri

      - name: check
        run: cargo check
        working-directory: src-tauri

  ui:
    name: UI syntax (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: node --check all UI modules
        run: find ui -name '*.js' -exec node --check {} \;
